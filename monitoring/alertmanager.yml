global:
  resolve_timeout: 5m


route:
  receiver: default-receiver
  group_by: ['alertname','job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h


  routes:
    - match:
        severity: critical
      receiver: critical-receiver
      group_wait: 10s

    - match:
        severity: warning
      receiver: default-receiver


inhibit_rules:
  - source_match:
      alertname: ShortURLServiceDown
      severity: critical
    target_match:
      severity: warning
    equal: ['job']


receivers:
  - name: default-receiver
    webhook_configs:
      - url: 'http://webhook-logger:5001/alert'
        send_resolved: true

  - name: critical-receiver
    webhook_configs:
      - url: 'http://webhook-logger:5001/critical'
        send_resolved: true

