global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 'localhost:9090'

  - job_name: shorturl-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'app:5000'

  - job_name: node_exporter
    static_configs:
      - targets:
          - 'node-exporter:9100'

  - job_name: redis
    static_configs:
      - targets:
          - 'redis-exporter:9121'

  - job_name: postgres
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]

    static_configs:
      - targets:
          - http://nginx/health
          - http://nginx/metrics

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115