# NGINX sits in front of Flask — it's the front door
# This is the standard production pattern

events {
    worker_connections 1024;
}

http {

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    # Log format includes response time — useful for latency debugging
    log_format main '$remote_addr - $request - $status '
                    '$body_bytes_sent "$http_referer" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream flask_app {
        server app:5000;   # 'app' is the Docker service name
    }

    server {
        listen 80;

        # Rate limiting — max 100 requests/second per IP
        # Protects against accidental or intentional floods
        

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Timeouts — if Flask takes >30s, NGINX returns 504
            proxy_connect_timeout 30s;
            proxy_read_timeout    30s;
        }

        # Health check endpoint bypasses rate limiting
        location /health {
            proxy_pass http://flask_app;
        }

        # Metrics endpoint — internal use only in production
        # We expose it here for now; in production you'd restrict by IP
        location /metrics {
            proxy_pass http://flask_app;
        }
    }
}