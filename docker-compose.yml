
networks:
  platform:
    driver: bridge


volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:


services:

  postgres:
    image: postgres:15-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_DB:   urldb
      POSTGRES_USER: urluser
      POSTGRES_PASSWORD: urlpass

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urluser -d urldb"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    
  app:
    build: ./app
    container_name: platform-app
    environment:
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_NAME:    urldb
      DB_USER:    urluser
      DB_PASSWORD: urlpass

      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: platform-nginx
    ports:
     - "8080:80"
    volumes:
     - ./app/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app

    networks:
      - platform

    restart: unless-stopped

  
  prometheus:
    image: prom/prometheus:latest
    container_name: platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

    command: 
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

    networks:
      - platform
    restart: unless-stopped

  
  grafana:
    image: grafana/grafana:latest
    container_name: platform-grafana
    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

    depends_on:
      - prometheus
    networks:
      - platform
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: platform-alert_manager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - platform

    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: platform-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    
    networks:
      - platform
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: platform-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - platform
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: platform-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://urluser:urlpass@postgres:5432/urldb?sslmode=disable
    depends_on:
      - postgres
    networks:
      - platform
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: platform-blackbox-exporter

    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - platform
    restart: unless-stopped

  webhook-logger:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.webhook
    container_name: platform-webhook-logger
    networks:
      - platform
    restart: unless-stopped







